apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - deployment.yaml
  - service.yaml
  - route.yaml

# -----------------------------------------------------------------------------
# Image tag — updated automatically by the CI pipeline after every build.
#
# The pipeline runs:
#   sed -i "s|newName: quay.io/cmays20/ai-demo-scratchpad
#   sed -i "s|newTag: a92e868165f8acb5da3a45353102c20cb1a41d55
#
# ArgoCD detects the git commit, syncs this file, and rolls out the new image.
# Do NOT manually edit newTag in a GitOps workflow — let the pipeline do it.
# -----------------------------------------------------------------------------
images:
  - name: ai-demo-scratchpad
    newName: quay.io/cmays20/ai-demo-scratchpad
    newTag: a92e868165f8acb5da3a45353102c20cb1a41d55
