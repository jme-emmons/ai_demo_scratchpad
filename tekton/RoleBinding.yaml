# =============================================================================
# RoleBindings for the pipeline ServiceAccount
#
# Applied automatically by ArgoCD (argocd-app-tekton.yaml watches tekton/).
#
# "edit" — allows the pipeline SA to create/update Deployments, Services,
#           Routes, and other standard resources in the app namespace.
#
# "system:image-pusher" — allows the pipeline SA to push built images to
#                          the OpenShift internal image registry.
#
# NOTE: Update the subjects[].namespace field below to match the namespace
# specified in gitops/argocd-app-tekton.yaml (destination.namespace).
# =============================================================================
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ai-demo-pipeline-sa-edit
  labels:
    app: ai-demo-scratchpad
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: edit
subjects:
  - kind: ServiceAccount
    name: ai-demo-pipeline-sa
    namespace: <your-namespace>   # <-- update
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ai-demo-pipeline-sa-image-pusher
  labels:
    app: ai-demo-scratchpad
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:image-pusher
subjects:
  - kind: ServiceAccount
    name: ai-demo-pipeline-sa
    namespace: <your-namespace>   # <-- update
