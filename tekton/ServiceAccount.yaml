# ServiceAccount used by the pipeline tasks.
# Bind the "edit" ClusterRole so tasks can create/update Deployments, Services,
# and Routes in the target namespace.  The pipeline SA also needs image-pusher
# rights for the internal registry.
#
# Apply:
#   oc apply -f tekton/ServiceAccount.yaml
#   oc policy add-role-to-user edit -z ai-demo-pipeline-sa -n <your-namespace>
#   oc policy add-role-to-user system:image-pusher -z ai-demo-pipeline-sa -n <your-namespace>
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ai-demo-pipeline-sa
  labels:
    app: ai-demo-scratchpad
---
# Link the registry-auth Secret so Buildah can push images
# (only needed when using a non-internal registry; the internal registry
#  uses the SA token automatically).
# apiVersion: v1
# kind: Secret
# metadata:
#   name: registry-auth
#   annotations:
#     tekton.dev/docker-0: https://quay.io   # adjust to your registry
# type: kubernetes.io/dockerconfigjson
# data:
#   .dockerconfigjson: <base64-encoded-docker-config>
